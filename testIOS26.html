<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Liquid Glass Telegram App</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

*{
    box-sizing:border-box;
    user-select:none;
}

body{
    margin:0;
    height:100vh;
    background:linear-gradient(160deg,#111,#444);
    color:white;
    font-family:Arial;
    overflow:hidden;
}


h1{
    text-align:center;
    margin-top:100px;
}


/* нижний островок */

.island{

    position:fixed;
    bottom:35px;
    left:50%;
    transform:translateX(-50%);

    display:flex;
    gap:12px;

    padding:12px 18px;

    border-radius:50px;

    background:
    rgba(255,255,255,.15);

    backdrop-filter:blur(25px);

    box-shadow:
    0 15px 50px rgba(0,0,0,.5);

}


/* кнопки */

.item{

    width:65px;
    height:65px;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;

    font-size:25px;

    transition:.25s;

}


.item small{
    font-size:9px;
}



.item.active{

    background:
    rgba(255,255,255,.35);

    transform:scale(1.15);

}



/* плавающая лупа */

#glass{

    position:absolute;

    width:90px;
    height:90px;

    border-radius:50%;

    display:none;

    align-items:center;
    justify-content:center;

    text-align:center;


    background:
    rgba(255,255,255,.25);


    backdrop-filter:
    blur(30px);


    box-shadow:
    0 20px 60px black;


    pointer-events:none;

    font-size:12px;

}

</style>

</head>


<body>


<h1 id="page">
Главная
</h1>


<div class="island">


<div class="item" data-name="Избранные">
⭐
<small>Избранные</small>
</div>


<div class="item" data-name="Недавние">
🕘
<small>Недавние</small>
</div>


<div class="item" data-name="Контакты">
👥
<small>Контакты</small>
</div>


<div class="item" data-name="Клавиши">
⌨️
<small>Клавиши</small>
</div>


<div class="item" data-name="Профиль">
👤
<small>Профиль</small>
</div>


</div>


<div id="glass"></div>



<script>


// Telegram

const tg = window.Telegram.WebApp;

tg.expand();



let glass =
document.getElementById("glass");


let page =
document.getElementById("page");


let selected=null;

let timer;



document.querySelectorAll(".item")
.forEach(item=>{


item.addEventListener(
"touchstart",
e=>{


timer=setTimeout(()=>{


selected=item;


glass.style.display="flex";

glass.innerHTML=
item.dataset.name;


moveGlass(
e.touches[0]
);



},300);


});





item.addEventListener(
"touchmove",
e=>{


clearTimeout(timer);


if(!selected)
return;


moveGlass(
e.touches[0]
);


checkTarget(
e.touches[0]
);


});






item.addEventListener(
"touchend",
()=>{


clearTimeout(timer);



if(selected){


page.innerHTML=
"Открыто: "+
selected.dataset.name;


}



glass.style.display="none";


document.querySelectorAll(".item")
.forEach(x=>
x.classList.remove("active")
);


selected=null;


});



});





function moveGlass(touch){


glass.style.left=
touch.clientX-45+"px";


glass.style.top=
touch.clientY-45+"px";


}





function checkTarget(touch){


document.querySelectorAll(".item")
.forEach(item=>{


let r=
item.getBoundingClientRect();


let x=
r.left+r.width/2;


let y=
r.top+r.height/2;



let distance=
Math.sqrt(
(touch.clientX-x)**2+
(touch.clientY-y)**2
);



if(distance<60){

item.classList.add("active");

}else{

item.classList.remove("active");

}



});


}



</script>


</body>
</html>
